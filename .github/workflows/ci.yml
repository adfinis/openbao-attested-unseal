name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  core:
    name: Core Quality
    runs-on: ubuntu-24.04
    env:
      SEMGREP_VERSION: "1.157.0"
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup repo tools
        uses: ./.github/actions/setup-repo-tools

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: .github/tools/package-lock.json

      - name: Install ast-grep
        run: npm ci --prefix .github/tools

      - name: Add local npm tools to PATH
        run: echo "${GITHUB_WORKSPACE}/.github/tools/node_modules/.bin" >> "${GITHUB_PATH}"

      - name: Install Semgrep
        run: |
          python3 -m venv .venv-semgrep
          . .venv-semgrep/bin/activate
          python -m pip install --upgrade pip
          python -m pip install "semgrep==${SEMGREP_VERSION}"
          echo "${GITHUB_WORKSPACE}/.venv-semgrep/bin" >> "${GITHUB_PATH}"

      - name: Install Trivy
        uses: aquasecurity/setup-trivy@81e514348e19b6112ce2a7e3ecbafe19c1e1f567 # v0.3.1
        with:
          version: v0.69.3

      - name: Run core quality gate
        run: make ci-core
