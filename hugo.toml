baseURL = "/"
languageCode = "en-us"
title = "OpenBao Attested Unseal Docs"
enableRobotsTXT = true
disableKinds = ["taxonomy", "term", "RSS"]

[params]
  repoURL = "https://github.com/adfinis/openbao-attested-unseal"
  defaultBranch = "main"
  repoLabel = "GitHub"
  productName = "openbao-attested-unseal"
  footerBlurb = "OpenBao attested unseal documentation, published with Hugo."
  logoPath = "brand/openbao-text-color.svg"
  logoAlt = "OpenBao"
  heroMarkPath = "brand/openbao-color.svg"
  faviconPath = "brand/openbao-single-color-square.svg"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 3
    ordered = false

[module]
  [[module.mounts]]
    source = "website/content"
    target = "content"

  [[module.mounts]]
    source = "docs/getting-started"
    target = "content/getting-started"

  [[module.mounts]]
    source = "docs/architecture"
    target = "content/architecture"

  [[module.mounts]]
    source = "docs/security"
    target = "content/security"

  [[module.mounts]]
    source = "docs/reference"
    target = "content/reference"

  [[module.mounts]]
    source = "docs/operations"
    target = "content/operations"

  [[module.mounts]]
    source = "docs/development"
    target = "content/development"

  [[module.mounts]]
    source = "website/layouts"
    target = "layouts"

  [[module.mounts]]
    source = "website/assets"
    target = "assets"

  [[module.mounts]]
    source = "website/static"
    target = "static"
