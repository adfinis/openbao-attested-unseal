rules:
  - id: no-http-default-client-runtime
    message: >-
      Avoid package-level HTTP helpers and the shared default client in runtime
      code. Construct an explicit http.Client with transport and timeout policy.
    severity: WARNING
    languages:
      - go
    paths:
      include:
        - /cmd/**/*.go
        - /internal/**/*.go
      exclude:
        - '**/*_test.go'
        - '**/testing_*.go'
    pattern-either:
      - pattern: http.DefaultClient
      - pattern: http.Get(...)
      - pattern: http.Post(...)
      - pattern: http.PostForm(...)
      - pattern: http.Head(...)
