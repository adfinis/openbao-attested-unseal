apiVersion: v1
kind: ConfigMap
metadata:
  name: bao-unseald-config
  namespace: openbao
  labels:
    app.kubernetes.io/name: bao-unseald
    app.kubernetes.io/part-of: openbao-attested-unseal
data:
  broker.json: |
    {
      "listen_address": "0.0.0.0:8443",
      "allow_plaintext_for_tests": true,
      "sqlite_path": "/var/lib/openbao-attested-unseal/broker.db",
      "audit_file_path": "/var/log/openbao-attested-unseal/audit.jsonl",
      "otel_exporter": "none",
      "default_policy_path": "/etc/openbao-attested-unseal/default-policy.json",
      "keyring_protection_profile": "development",
      "cluster_id": "prod-eu1",
      "key_id": "root",
      "development_wrapping_key_b64": "AQEBAQEBAQEBAQEBAQEBAQEBAQEBAQEBAQEBAQEBAQE=",
      "challenge_ttl_seconds": 120,
      "kubernetes": {
        "enabled": true,
        "token_review_audience": "bao-unseald",
        "namespace": "openbao",
        "service_account": "openbao",
        "node_evidence_ttl_seconds": 300,
        "node_evidence_retention_seconds": 86400,
        "api_timeout_seconds": 10,
        "allow_unbound_service_account_tokens": false,
        "allow_fake_node_evidence_publish": true
      }
    }
  default-policy.json: |
    {
      "policy_id": "development",
      "mode": "development-subject",
      "development_subjects": ["openbao.openbao"]
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bao-unseald
  namespace: openbao
  labels:
    app.kubernetes.io/name: bao-unseald
    app.kubernetes.io/part-of: openbao-attested-unseal
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: bao-unseald
  template:
    metadata:
      labels:
        app.kubernetes.io/name: bao-unseald
        app.kubernetes.io/part-of: openbao-attested-unseal
    spec:
      serviceAccountName: bao-unseald
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: bao-unseald
          image: ghcr.io/adfinis/openbao-attested-unseal/bao-unseald:0.0.0-dev
          imagePullPolicy: IfNotPresent
          args: ["serve", "-config", "/etc/openbao-attested-unseal/broker.json"]
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
            runAsNonRoot: true
          ports:
            - name: grpc
              containerPort: 8443
          volumeMounts:
            - name: config
              mountPath: /etc/openbao-attested-unseal
              readOnly: true
            - name: state
              mountPath: /var/lib/openbao-attested-unseal
            - name: audit
              mountPath: /var/log/openbao-attested-unseal
      volumes:
        - name: config
          configMap:
            name: bao-unseald-config
        - name: state
          emptyDir: {}
        - name: audit
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: bao-unseald
  namespace: openbao
  labels:
    app.kubernetes.io/name: bao-unseald
    app.kubernetes.io/part-of: openbao-attested-unseal
spec:
  selector:
    app.kubernetes.io/name: bao-unseald
  ports:
    - name: grpc
      port: 8443
      targetPort: grpc
